services:
  - type: web
    name: football-predictor-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: football-predictor-db
          property: connectionString
      - key: OWNER_EMAIL
        value: adi.asif19@gmail.com
      - key: AUTH_SECRET
        generateValue: true
      - key: OWNER_PASSWORD_HASH
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      - key: API_ALLOWED_ORIGINS
        value: "https://football.adiandadilproductions.com"
      - key: FOOTBALL_DATA_API_TOKEN
        sync: false
      - key: API_FOOTBALL_API_KEY
        sync: false
      - key: SPORTRADAR_API_KEY
        sync: false

databases:
  - name: football-predictor-db
    plan: free
